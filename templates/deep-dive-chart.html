<!DOCTYPE html><html><head><meta charset="utf-8"><style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1080px; height: 1920px; background: #0D1B35; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; display: flex; flex-direction: column; padding: 52px 44px 44px; }
.tag { display: inline-block; padding: 12px 28px; border-radius: 10px; font-size: 24px; font-weight: 700; letter-spacing: 0.15em; background: rgba(245,200,66,0.12); color: #F5C842; }
.tag-green { background: rgba(52,211,153,0.12); color: #34D399; }
.tag-red { background: rgba(248,113,113,0.12); color: #F87171; }
h1 { font-size: 76px; font-weight: 800; line-height: 1.1; }
h2 { font-size: 56px; font-weight: 800; line-height: 1.12; }
h3 { font-size: 44px; font-weight: 800; }
.muted { color: rgba(255,255,255,0.4); }
.meta { font-size: 26px; color: rgba(255,255,255,0.4); letter-spacing: 0.04em; margin-top: 8px; }
.photo { width: 100%; border-radius: 28px; overflow: hidden; background: #edf0f4; position: relative; display: flex; align-items: center; justify-content: center; }
.photo img { width: 100%; height: 100%; object-fit: contain; }
.photo .num { position: absolute; top: 16px; right: 16px; background: rgba(13,27,53,0.85); border: 1px solid rgba(245,200,66,0.25); border-radius: 10px; padding: 6px 16px; font-size: 22px; color: rgba(255,255,255,0.5); font-weight: 600; }
.photo .photo-placeholder { font-size: 72px; padding: 80px 0; }
.stats { display: flex; gap: 16px; }
.stat { flex: 1; background: rgba(255,255,255,0.04); border-radius: 20px; padding: 28px; }
.stat .label { font-size: 20px; color: rgba(255,255,255,0.35); letter-spacing: 0.12em; margin-bottom: 12px; font-weight: 600; }
.stat .val { font-size: 42px; font-weight: 700; }
.chart-box { background: rgba(255,255,255,0.04); border-radius: 24px; padding: 32px; display: flex; align-items: center; justify-content: center; }
.chart-box svg { width: 100%; }
.big { font-size: 108px; font-weight: 800; line-height: 1; letter-spacing: -0.03em; }
.card { background: rgba(52,211,153,0.06); border: 2px solid rgba(52,211,153,0.15); border-radius: 28px; padding: 40px; text-align: center; }
.card-gold { background: rgba(245,200,66,0.08); border: 2px solid rgba(245,200,66,0.18); border-radius: 28px; padding: 40px; text-align: center; }
.footer { margin-top: auto; padding-top: 28px; display: flex; align-items: center; justify-content: space-between; }
.logo { display: flex; align-items: center; gap: 14px; }
.logo-icon { width: 56px; height: 56px; background: #F5C842; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 22px; color: #0D1B35; }
.logo-text { font-weight: 700; font-size: 28px; color: #F5C842; letter-spacing: 0.08em; }
.url { font-size: 22px; color: rgba(255,255,255,0.3); }
.spacer { flex: 1; }
.gold { color: #F5C842; } .green { color: #34D399; } .red { color: #F87171; }
.rank { width: 72px; height: 72px; border-radius: 16px; display: inline-flex; align-items: center; justify-content: center; font-weight: 800; font-size: 32px; }
.row { display: flex; align-items: center; gap: 20px; }</style></head><body>
<div class="row" style="margin-bottom:24px">
  <div style="width:140px;height:140px;border-radius:24px;overflow:hidden;background:#1a2a4a;display:flex;align-items:center;justify-content:center;flex-shrink:0">{{SET_IMAGE}}</div>
  <div><div class="tag">PRICE HISTORY</div><h2 style="font-size:44px;margin-top:10px">12-Month Trend</h2></div>
</div>
<p class="meta">From {{RETAIL_PRICE}} retail to {{CURRENT_VALUE}} market value</p>
<div class="chart-box" style="flex:1;margin:24px 0">{{TREND_SVG_GREEN}}</div>
<div class="stats">
  <div class="stat"><div class="label">RETAIL</div><div class="val muted">{{RETAIL_PRICE}}</div></div>
  <div class="stat" style="text-align:center"><div class="label">12M GROWTH</div><div class="val green">{{GROWTH_12M}}</div></div>
  <div class="stat" style="text-align:right"><div class="label">CURRENT</div><div class="val gold">{{CURRENT_VALUE}}</div></div>
</div>
<div class="footer"><div class="logo"><div class="logo-icon">BX</div><span class="logo-text">BRIX</span></div><span class="url">brixcollector.com</span></div>
</body></html>
