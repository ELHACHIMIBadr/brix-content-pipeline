name: BRIX Content Pipeline

on:
  schedule:
    # Run daily at 6:00 AM London (5:00 UTC) — generates all posts for the day
    # Buffer queues them and publishes at your scheduled slots
    - cron: '0 5 * * *'
  workflow_dispatch: # Manual trigger

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium for Puppeteer
        run: npx puppeteer browsers install chrome

      - name: Setup Firebase service account
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > firebase-service-account.json

      - name: Restore scrape cache
        uses: actions/cache@v4
        with:
          path: data/scrape-cache.json
          key: scrape-cache-${{ github.run_id }}
          restore-keys: scrape-cache-

      - name: Run pipeline
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          REBRICKABLE_API_KEY: ${{ secrets.REBRICKABLE_API_KEY }}
          BUFFER_API_KEY: ${{ secrets.BUFFER_API_KEY }}
          BUFFER_ORG_ID: ${{ secrets.BUFFER_ORG_ID }}
          BUFFER_IG_CHANNEL_ID: ${{ secrets.BUFFER_IG_CHANNEL_ID }}
          BUFFER_TIKTOK_CHANNEL_ID: ${{ secrets.BUFFER_TIKTOK_CHANNEL_ID }}
        run: node src/index.js
